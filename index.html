<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球劳动法律查询系统 | Global Labor Law Database</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.card-shadow{box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
.container-custom{max-width:1280px;margin:0 auto;padding:0 1rem}
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 text-white">
<div class="container-custom py-12">
<div class="flex items-center gap-3 mb-4"><span class="text-4xl">🌍</span><h1 class="text-4xl font-bold">全球劳动法律查询系统</h1></div>
<p class="text-blue-100 text-lg mb-6 max-w-2xl">查询 12 个区域、80+ 国家的劳动法规，提供精准的中文翻译和专业解读。</p>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/20"><div class="flex items-center gap-2 mb-2"><span class="text-xl">📚</span><span class="font-semibold" id="statLaws">0 条</span></div><p class="text-blue-100 text-sm">精选核心劳动法规</p></div>
<div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/20"><div class="flex items-center gap-2 mb-2"><span class="text-xl">🌐</span><span class="font-semibold" id="statCountries">0 个国家</span></div><p class="text-blue-100 text-sm">覆盖全球各区域</p></div>
<div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/20"><div class="flex items-center gap-2 mb-2"><span class="text-xl">✅</span><span class="font-semibold">已验证翻译</span></div><p class="text-blue-100 text-sm">专业律师校审</p></div>
</div></div></header>
<main class="container-custom py-8">
<div class="mb-8 relative">
<div class="relative">
<svg class="absolute left-4 top-3.5 text-gray-400" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
<input id="searchInput" type="text" placeholder="搜索法律条款、关键词或国家名称..." class="w-full pl-12 pr-12 py-3 rounded-lg border border-gray-300 bg-white text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
<button class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600 hidden" id="searchClearBtn" onclick="document.getElementById('searchInput').value='';applyFilter()">
<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
</button></div>
<div class="mt-3 flex flex-wrap gap-2 items-center">
<span class="text-xs text-gray-500">热门搜索：</span>
<button class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-200" onclick="document.getElementById('searchInput').value='解雇';applyFilter()">解雇</button>
<button class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-200" onclick="document.getElementById('searchInput').value='社保';applyFilter()">社保</button>
<button class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-200" onclick="document.getElementById('searchInput').value='预告期';applyFilter()">预告期</button>
<button class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-200" onclick="document.getElementById('searchInput').value='休假';applyFilter()">休假</button>
</div></div>
<div class="lg:hidden mb-6 flex gap-2">
<button class="flex-1 bg-white text-gray-800 px-4 py-2 rounded-lg border border-gray-300 flex items-center justify-center gap-2 hover:bg-gray-50" onclick="document.getElementById('filterPanel').classList.toggle('hidden')">📋 筛选选项</button>
<button id="mobileResetBtn" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 hidden" onclick="resetAll()">✕</button>
</div>
<div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
<div id="filterPanel" class="hidden lg:block">
<div class="bg-white rounded-lg p-6 card-shadow sticky top-8">
<div class="flex items-center justify-between mb-6">
<h3 class="font-bold text-gray-900 text-lg">筛选选项 Filters</h3>
<button id="filterResetBtn" class="text-xs text-blue-600 hover:text-blue-700 font-medium hidden" onclick="resetAll()">清除 Reset</button>
</div>
<div class="mb-6 pb-6 border-b border-gray-200">
<button class="w-full flex items-center justify-between mb-3 hover:text-blue-600" onclick="toggleSec('regionDiv')"><h4 class="font-semibold text-gray-900">地区 Region</h4><svg class="w-4 h-4 chev" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg></button>
<div id="regionDiv" class="space-y-1 max-h-64 overflow-y-auto pr-1"></div>
</div>
<div class="mb-6 pb-6 border-b border-gray-200">
<button class="w-full flex items-center justify-between mb-3 hover:text-blue-600" onclick="toggleSec('countryDiv')"><h4 class="font-semibold text-gray-900"><span id="countryTitle">国家 Country</span></h4><svg class="w-4 h-4 chev" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg></button>
<div id="countryDiv" class="space-y-1 max-h-64 overflow-y-auto pr-1"></div>
</div>
<div>
<button class="w-full flex items-center justify-between mb-3 hover:text-blue-600" onclick="toggleSec('categoryDiv')"><h4 class="font-semibold text-gray-900">分类 Category</h4><svg class="w-4 h-4 chev" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg></button>
<div id="categoryDiv" class="space-y-1 max-h-48 overflow-y-auto pr-1"></div>
</div>
</div></div>
<div class="lg:col-span-3">
<div id="resultCount" class="mb-6 text-sm text-gray-600"></div>
<div id="resultList" class="grid gap-4 auto-rows-max"></div>
<div id="emptyState" class="text-center py-12 bg-white rounded-lg card-shadow hidden">
<div class="text-6xl text-gray-300 mb-4">🔍</div>
<p class="text-gray-500 text-lg mb-2">没有找到匹配的法律条款</p>
<p class="text-gray-400 text-sm mb-6">尝试调整搜索条件或筛选选项</p>
<button class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700" onclick="resetAll()">重置筛选</button>
</div>
</div></div></main>
<footer class="bg-white border-t border-gray-200 mt-16">
<div class="container-custom py-8">
<div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
<div><h3 class="font-bold text-gray-900 mb-4">关于本站</h3><p class="text-gray-600 text-sm">全球劳动法律查询系统覆盖 12 个区域、80+ 国家的劳动法规。</p></div>
<div><h3 class="font-bold text-gray-900 mb-4">数据来源</h3><ul class="text-gray-600 text-sm space-y-2"><li>✓ 官方法律网站</li><li>✓ 专业律师翻译</li><li>✓ 定期更新维护</li></ul></div>
<div><h3 class="font-bold text-gray-900 mb-4">免责声明</h3><p class="text-gray-600 text-sm">本网站信息仅供参考，不构成法律建议。</p></div>
</div>
<div class="border-t border-gray-200 pt-6 text-center text-gray-500 text-sm"><p>&copy; 2026 Global Labor Law Database</p></div>
</div></footer>
<script src="app.js"></script>
</body></html>
