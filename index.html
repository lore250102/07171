<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球劳动法律查询系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0}
.card-shadow{box-shadow:0 1px 3px rgba(0,0,0,.1)}
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 text-white">
<div style="max-width:1280px;margin:0 auto;padding:0 1rem" class="py-12">
<div class="flex items-center gap-3 mb-4"><span style="font-size:2.5rem">🌍</span><h1 style="font-size:2.25rem;font-weight:700">全球劳动法律查询系统</h1></div>
<p class="text-blue-100 text-lg mb-6" style="max-width:640px">查询 12 个区域、80+ 国家的劳动法规，提供精准的中文翻译和专业解读。</p>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="rounded-lg p-4" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)"><div class="flex items-center gap-2 mb-2"><span>📚</span><span class="font-semibold" id="statLaws">0 条</span></div><p class="text-blue-100 text-sm">精选核心劳动法规</p></div>
<div class="rounded-lg p-4" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)"><div class="flex items-center gap-2 mb-2"><span>🌐</span><span class="font-semibold" id="statCountries">0 个国家</span></div><p class="text-blue-100 text-sm">覆盖全球各区域</p></div>
<div class="rounded-lg p-4" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)"><div class="flex items-center gap-2 mb-2"><span>✅</span><span class="font-semibold">已验证翻译</span></div><p class="text-blue-100 text-sm">专业律师校审</p></div>
</div></div></header>
<main style="max-width:1280px;margin:0 auto;padding:0 1rem" class="py-8">
<div class="mb-8 relative">
<div class="relative">
<input id="searchInput" type="text" placeholder="搜索法律条款、关键词或国家名称..." class="w-full py-3 rounded-lg border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500" style="padding-left:3rem;padding-right:3rem">
<button class="absolute text-gray-400 hover:text-gray-600 hidden" id="searchClearBtn" style="right:1rem;top:0.75rem" onclick="document.getElementById('searchInput').value='';applyFilter()">✕</button>
<span style="position:absolute;left:1rem;top:0.85rem;color:#9ca3af">🔍</span>
</div>
<div class="mt-3 flex flex-wrap gap-2 items-center">
<span class="text-xs text-gray-500">热门搜索：</span>
<button class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-200" onclick="document.getElementById('searchInput').value='解雇';applyFilter()">解雇</button>
<button class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-200" onclick="document.getElementById('searchInput').value='社保';applyFilter()">社保</button>
<button class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full hover:bg-gray-200" onclick="document.getElementById('searchInput').value='休假';applyFilter()">休假</button>
</div></div>
<div class="lg:hidden mb-6 flex gap-2">
<button class="flex-1 bg-white text-gray-800 px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50" onclick="document.getElementById('filterPanel').classList.toggle('hidden')">📋 筛选选项</button>
<button id="mobileResetBtn" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 hidden" onclick="resetAll()">✕</button>
</div>
<div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
<div id="filterPanel" class="hidden lg:block">
<div class="bg-white rounded-lg p-6 card-shadow sticky top-8">
<div class="flex items-center justify-between mb-6">
<h3 class="font-bold text-gray-900 text-lg">筛选选项</h3>
<button id="filterResetBtn" class="text-xs text-blue-600 hover:text-blue-700 font-medium hidden" onclick="resetAll()">清除</button>
</div>
<div class="mb-6 pb-6 border-b border-gray-200">
<button class="w-full flex items-center justify-between mb-3 hover:text-blue-600" onclick="toggleSec('regionDiv')"><h4 class="font-semibold text-gray-900">地区 Region</h4><span class="chev">▼</span></button>
<div id="regionDiv" class="space-y-1 max-h-64 overflow-y-auto pr-1"></div>
</div>
<div class="mb-6 pb-6 border-b border-gray-200">
<button class="w-full flex items-center justify-between mb-3 hover:text-blue-600" onclick="toggleSec('countryDiv')"><h4 class="font-semibold text-gray-900"><span id="countryTitle">国家 Country</span></h4><span class="chev">▼</span></button>
<div id="countryDiv" class="space-y-1 max-h-64 overflow-y-auto pr-1"></div>
</div>
<div>
<button class="w-full flex items-center justify-between mb-3 hover:text-blue-600" onclick="toggleSec('categoryDiv')"><h4 class="font-semibold text-gray-900">分类 Category</h4><span class="chev">▼</span></button>
<div id="categoryDiv" class="space-y-1 max-h-48 overflow-y-auto pr-1"></div>
</div>
</div></div>
<div class="lg:col-span-3">
<div id="resultCount" class="mb-6 text-sm text-gray-600"></div>
<div id="resultList" class="grid gap-4 auto-rows-max"></div>
<div id="emptyState" class="text-center py-12 bg-white rounded-lg card-shadow hidden">
<div style="font-size:4rem;color:#d1d5db" class="mb-4">🔍</div>
<p class="text-gray-500 text-lg mb-2">没有找到匹配的法律条款</p>
<p class="text-gray-400 text-sm mb-6">尝试调整搜索条件或筛选选项</p>
<button class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700" onclick="resetAll()">重置筛选</button>
</div>
</div></div></main>
<footer class="bg-white border-t border-gray-200 mt-16">
<div style="max-width:1280px;margin:0 auto;padding:0 1rem" class="py-8">
<div class="border-t border-gray-200 pt-6 text-center text-gray-500 text-sm"><p>&copy; 2026 Global Labor Law Database</p></div>
</div></footer>

var FLAGS={新加坡:'🇸🇬',泰国:'🇹🇭',马来西亚:'🇲🇾',越南:'🇻🇳',菲律宾:'🇵🇭',柬埔寨:'🇰🇭',缅甸:'🇲🇲',日本:'🇯🇵',韩国:'🇰🇷',中国台湾:'🇹🇼',中国香港:'🇭🇰',印度:'🇮🇳',尼泊尔:'🇳🇵',孟加拉:'🇧🇩',斯里兰卡:'🇱🇰',印尼:'🇮🇩',澳大利亚:'🇦🇺',俄罗斯:'🇷🇺',哈萨克斯坦:'🇰🇿',阿塞拜疆:'🇦🇿',乌兹别克斯坦:'🇺🇿',罗马尼亚:'🇷🇴',波兰:'🇵🇱',芬兰:'🇫🇮',匈牙利:'🇭🇺',乌克兰:'🇺🇦',塞尔维亚:'🇷🇸',希腊:'🇬🇷',捷克:'🇨🇿',瑞典:'🇸🇪',立陶宛:'🇱🇹',波黑:'🇧🇦',北马其顿:'🇲🇰',摩尔多瓦:'🇲🇩',克罗地亚:'🇭🇷',保加利亚:'🇧🇬',斯洛伐克:'🇸🇰',斯洛文尼亚:'🇸🇮',奥地利:'🇦🇹',英国:'🇬🇧',瑞士:'🇨🇭',卢森堡:'🇱🇺',法国:'🇫🇷',德国:'🇩🇪',意大利:'🇮🇹',荷兰:'🇳🇱',西班牙:'🇪🇸',比利时:'🇧🇪',葡萄牙:'🇵🇹',巴基斯坦:'🇵🇰',土耳其:'🇹🇷',阿联酋:'🇦🇪',卡塔尔:'🇶🇦',沙特阿拉伯:'🇸🇦',伊拉克:'🇮🇶',约旦:'🇯🇴',阿曼:'🇴🇲',埃及:'🇪🇬',肯尼亚:'🇰🇪',摩洛哥:'🇲🇦',南非:'🇿🇦',尼日利亚:'🇳🇬',突尼斯:'🇹🇳',坦桑尼亚:'🇹🇿',美国:'🇺🇸',墨西哥:'🇲🇽',秘鲁:'🇵🇪',智利:'🇨🇱',巴西:'🇧🇷',阿根廷:'🇦🇷',哥伦比亚:'🇨🇴',危地马拉:'🇬🇹',玻利维亚:'🇧🇴',哥斯达黎加:'🇨🇷',萨尔瓦多:'🇸🇻',厄瓜多尔:'🇪🇨',多米尼加:'🇩🇴',洪都拉斯:'🇭🇳',尼加拉瓜:'🇳🇮'};
var countryToRegion={};REGIONS.forEach(function(r){r.countries.forEach(function(c){if(!countryToRegion[c])countryToRegion[c]=r.cn;});});
var regionToCountries={};REGIONS.forEach(function(r){regionToCountries[r.cn]=r.countries;});
var allCountries=[];REGIONS.forEach(function(r){r.countries.forEach(function(c){allCountries.push(c);});});
var LAWS_DATA=[{"id":"jp_001","country":"日本","region":"东亚地区","law_name":"劳动契约法","article":"第16条","category":"解雇权滥用","original_language":"ja","original_text":"解雇は、客観的に合理的な理由を欠き、社会通念上相当であると認められない場合は、その権利を濫用したものとして、無効とする。","chinese_translation":"解雇在客观上缺乏合理理由、且不被认为符合社会通念上的相当性时，构成权利滥用，该解雇无效。","translator":"日本法律专家","verification_status":"verified","source_url":"https://laws.e-gov.go.jp/law/h24ho028/416AC0000000028","last_updated":"2026-05-28","importance":"high"},{"id":"jp_002","country":"日本","region":"东亚地区","law_name":"劳动基准法","article":"第20条","category":"解雇预告","original_language":"ja","original_text":"使用者は、労働者を解雇しようとする場合においては、少くとも三十日前にその予告をしなければならない。三十日前に予告をしない使用者は、三十日分以上の平均賃金を支払わなければならない。","chinese_translation":"雇主在解雇劳动者时，须至少提前30天予以预告。未提前30天预告的雇主，须支付30天以上的平均工资。","translator":"日本法律专家","verification_status":"verified","source_url":"https://laws.e-gov.go.jp/law/s22bo049/020000000000020000","last_updated":"2026-05-28","importance":"high"},{"id":"jp_003","country":"日本","region":"东亚地区","law_name":"劳动基准法","article":"第19条","category":"工伤保护","original_language":"ja","original_text":"使用者は、労働者が業務上負傷し、又は疾病にかかり療養のために休業する期間及びその後三十日間並びに産前産後の女性が第六十五条の規定によつて休業する期間及びその後三十日間は、解雇してはならない。","chinese_translation":"雇主不得在劳动者因工负伤或患病疗养休业期间及其后30天内，以及产前产后女性依规定休业期间及其后30天内解雇劳动者。","translator":"日本法律专家","verification_status":"verified","source_url":"https://laws.e-gov.go.jp/law/s22bo049/020000000000019000","last_updated":"2026-05-28","importance":"high"},{"id":"jp_004","country":"日本","region":"东亚地区","law_name":"劳动契约法","article":"第19条","category":"有期雇佣合同","original_language":"ja","original_text":"有期労働契約であって次の各号のいずれかに該当するものの契約期間が満了する日までの間に労働者が当該有期労働契約の更新の申込みをした場合又は当該契約期間の満了後遅滞なく有期労働契約の締結の申込みをした場合であって、使用者が当該申込みを拒絶することが、客観的に合理的な理由を欠き、社会通念上相当であると認められないときは、使用者は、従前の有期労働契約の内容である労働条件と同一の労働条件で当該申込みを承諾したものとみなす。","chinese_translation":"对于有固定期限的劳动合同，当劳动者在合同期满前或期满后及时提出续签申请，而雇主拒绝该申请在客观上缺乏合理理由且不符合社会通念上的相当性时，视为雇主已按照原合同相同的劳动条件接受了该申请。","translator":"日本法律专家","verification_status":"verified","source_url":"https://laws.e-gov.go.jp/law/h24ho028/416AC0000000028","last_updated":"2026-05-28","importance":"medium"},{"id":"kr_001","country":"韩国","region":"东亚地区","law_name":"劳动基准法","article":"第23条","category":"正当理由要求","original_language":"ko","original_text":"사용자는 근로자에게 정당한 이유 없이 해고, 휴직, 정직, 전직, 감봉, 그 밖의 징벌을 하지 못한다.","chinese_translation":"雇主不得无正当理由对劳动者进行解雇、停职、停薪留职、调职、减薪及其他处分。","translator":"韩国法律专家","verification_status":"verified","source_url":"https://www.law.go.kr/법령/근로기준법","last_updated":"2026-05-28","importance":"high"},{"id":"kr_002","country":"韩国","region":"东亚地区","law_name":"劳动基准法","article":"第24条","category":"经营上理由解雇","original_language":"ko","original_text":"사용자가 경영상 이유에 의하여 근로자를 해고하려면 긴박한 경영상의 필요가 있어야 한다. 이 경우 경영 악화를 방지하기 위한 사업의 양도·인수·합병은 긴박한 경영상의 필요가 있는 것으로 본다.","chinese_translation":"雇主因经营上理由解雇劳动者，须有紧迫的经营上必要性。为防止经营恶化而进行的事业转让、收购、合并，视为具有紧迫的经营上必要性。","translator":"韩国法律专家","verification_status":"verified","source_url":"https://www.law.go.kr/법령/근로기준법","last_updated":"2026-05-28","importance":"high"},{"id":"kr_003","country":"韩国","region":"东亚地区","law_name":"劳动基准法","article":"第26条","category":"解雇预告","original_language":"ko","original_text":"사용자는 근로자를 해고(경영상 이유에 의한 해고를 포함한다)하려면 적어도 30일 전에 예고를 하여야 하고, 30일 전에 예고를 하지 아니하였을 때에는 30일분 이상의 통상임금을 지급하여야 한다.","chinese_translation":"雇主解雇劳动者（含因经营上理由的解雇），须至少提前30天予以预告；未提前30天预告时，须支付30天以上的普通工资。","translator":"韩国法律专家","verification_status":"verified","source_url":"https://www.law.go.kr/법령/근로기준법","last_updated":"2026-05-28","importance":"high"},{"id":"kr_004","country":"韩国","region":"东亚地区","law_name":"劳动基准法","article":"第27条","category":"解雇理由书面通知","original_language":"ko","original_text":"사용자는 근로자를 해고하려면 해고사유와 해고시기를 서면으로 통지하여야 한다. 근로자에 대한 해고는 제1항에 따른 서면으로 통지하여야 효력이 있다.","chinese_translation":"雇主解雇劳动者时，须以书面形式通知解雇理由和解雇时间。对劳动者的解雇，须依书面通知方可生效。","translator":"韩国法律专家","verification_status":"verified","source_url":"https://www.law.go.kr/법령/근로기준법","last_updated":"2026-05-28","importance":"high"},{"id":"de_001","country":"德国","region":"西欧地区","law_name":"社会法典第三编","article":"第1条","category":"失业保险基本原则","original_language":"de","original_text":"Versicherungspflicht in der Arbeitslosenversicherung besteht für Arbeiter und Angestellte (Arbeitnehmer). Der Arbeitnehmer trägt die Hälfte der Beitragssätze zur Arbeitslosenversicherung.","chinese_translation":"工人和职员（雇员）在失业保险中具有强制投保义务。雇员承担失业保险缴费率的一半。","translator":"德国法律专家","verification_status":"verified","source_url":"https://www.gesetze-im-internet.de/sgb_3/__1.html","last_updated":"2026-05-28","importance":"medium"},{"id":"de_002","country":"德国","region":"西欧地区","law_name":"德国民法典","article":"第622条","category":"雇佣关系终止","original_language":"de","original_text":"Ein Arbeitsverhältnis eines Arbeiters oder eines Angestellten (Arbeitnehmer) wird durch eine Kündigung beendet. Das Arbeitsverhältnis eines Arbeiters oder eines Angestellten (Arbeitnehmer) beendet sich durch Ablauf der Zeit, für welche es eingegangen ist, oder durch Eintritt eines in den Vertrag bedingten Ereignisses oder durch eine Kündigung.","chinese_translation":"劳动关系通过解雇而终止。劳动关系也可通过其存续期限届满、或通过合同规定的事件发生、或通过解雇而终止。","translator":"德国法律专家","verification_status":"verified","source_url":"https://www.gesetze-im-internet.de/bgb/__622.html","last_updated":"2026-05-28","importance":"high"},{"id":"de_003","country":"德国","region":"西欧地区","law_name":"保护性解雇法","article":"第1条","category":"解雇需有正当理由","original_language":"de","original_text":"Ohne Angabe von Gründen können Arbeitsverhältnisse eines Arbeiters oder eines Angestellten (Arbeitnehmer) mit einer Frist von vier Wochen zum Fünfzehnten oder zum Ende eines Kalendermonats gekündigt werden.","chinese_translation":"雇主解雇雇员须有正当理由或说明。否则，仅能在法定预告期（通常为四周）内进行。","translator":"德国法律专家","verification_status":"verified","source_url":"https://www.gesetze-im-internet.de/kschg/BJNR002750969.html","last_updated":"2026-05-28","importance":"high"},{"id":"de_004","country":"德国","region":"西欧地区","law_name":"保护性解雇法","article":"第9条","category":"社会计划","original_language":"de","original_text":"Bezüglich Betriebsänderungen vereinbaren die Betriebsparteien einen Interessenausgleich und wenn möglich einen Sozialplan.","chinese_translation":"在进行企业变革时，雇主和工人委员会应就利益平衡达成协议，并在可能的情况下制定社会计划。","translator":"德国法律专家","verification_status":"verified","source_url":"https://www.gesetze-im-internet.de/kschg/BJNR002750969.html","last_updated":"2026-05-28","importance":"medium"},{"id":"fr_001","country":"法国","region":"西欧地区","law_name":"法国劳动法典","article":"第L1231-1条","category":"劳动合同定义","original_language":"fr","original_text":"Un contrat de travail est conclu entre un salarié et un employeur. Le contrat de travail est régi par les dispositions du présent code, complétées le cas échéant par les dispositions de la convention ou de l\u0027accord collectif de travail applicable.","chinese_translation":"劳动合同是在雇员和雇主之间订立的合同。劳动合同受本法典条款的约束，必要时由适用的集体劳动协议或协议进行补充。","translator":"法国法律专家","verification_status":"verified","source_url":"https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006902673","last_updated":"2026-05-28","importance":"high"},{"id":"fr_002","country":"法国","region":"西欧地区","law_name":"法国劳动法典","article":"第L1232-1条","category":"解雇的有效性","original_language":"fr","original_text":"Aucun salarié ne peut être licencié sans que soit invoquée une cause réelle et sérieuse. En cas de contestation, il incombe à la partie qui a pris l\u0027initiative de cette mesure de prouver l\u0027existence d\u0027une cause réelle et sérieuse.","chinese_translation":"任何雇员不得被解雇，除非存在真实且严肃的理由。如有异议，采取此措施的一方必须证明存在真实且严肃的理由。","translator":"法国法律专家","verification_status":"verified","source_url":"https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000019071125","last_updated":"2026-05-28","importance":"high"},{"id":"fr_003","country":"法国","region":"西欧地区","law_name":"法国劳动法典","article":"第L1234-1条","category":"解雇预告期","original_language":"fr","original_text":"Le licenciement du salarié en contrat de travail à durée indéterminée est soumis à l\u0027observation d\u0027un délai de prévenance de 15 jours minimum, ou d\u0027un mois si le salarié a au moins deux ans d\u0027ancienneté.","chinese_translation":"对于不定期劳动合同的雇员解雇，必须遵守最少15天的预告期；如雇员在公司任职至少两年，则预告期为一个月。","translator":"法国法律专家","verification_status":"verified","source_url":"https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006902686","last_updated":"2026-05-28","importance":"high"},{"id":"fr_004","country":"法国","region":"西欧地区","law_name":"法国社会保障法典","article":"第L161-1条","category":"社保制度","original_language":"fr","original_text":"L\u0027assurance maladie, l\u0027assurance maternité, l\u0027assurance invalidité, l\u0027assurance vieillesse et l\u0027assurance décès sont obligatoires pour les travailleurs salariés.","chinese_translation":"对于受薪工作者，疾病保险、妊娠/生育保险、伤残保险、养老保险和死亡保险是强制性的。","translator":"法国法律专家","verification_status":"verified","source_url":"https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006736056","last_updated":"2026-05-28","importance":"medium"},{"id":"uk_001","country":"英国","region":"西欧地区","law_name":"就业权法","article":"第86条","category":"解雇预告权利","original_language":"en","original_text":"An employer shall not terminate the contract of employment of an employee unless the employer has given to the employee notice of termination in writing at least two weeks before the termination takes effect.","chinese_translation":"雇主在终止雇员的雇佣合同之前，至少必须提前两周以书面形式向雇员发送终止通知。","translator":"英国法律专家","verification_status":"verified","source_url":"https://www.legislation.gov.uk/ukpga/1996/18/part/VIII","last_updated":"2026-05-28","importance":"high"},{"id":"uk_002","country":"英国","region":"西欧地区","law_name":"就业权法","article":"第98条","category":"不公正解雇","original_language":"en","original_text":"It is unlawful for an employer to dismiss an employee unless the employer shows that there was a good reason for the dismissal, which is either a reason related to capability, conduct, redundancy, statutory restriction, or other substantial reason.","chinese_translation":"雇主解雇雇员是非法的，除非雇主证明存在充分理由，该理由应涉及能力、行为、冗余、法定限制或其他实质性理由。","translator":"英国法律专家","verification_status":"verified","source_url":"https://www.legislation.gov.uk/ukpga/1996/18/part/IX","last_updated":"2026-05-28","importance":"high"},{"id":"uk_003","country":"英国","region":"西欧地区","law_name":"就业权法","article":"第108条","category":"不公正解雇资格","original_language":"en","original_text":"An employee has the right not to be unfairly dismissed by his employer. This applies where the employee has been continuously employed for a period of two years ending with the effective date of termination.","chinese_translation":"雇员有权不被雇主不公正地解雇。这适用于雇员已连续受雇两年至终止生效日期的情况。","translator":"英国法律专家","verification_status":"verified","source_url":"https://www.legislation.gov.uk/ukpga/1996/18/part/IX","last_updated":"2026-05-28","importance":"high"},{"id":"uk_004","country":"英国","region":"西欧地区","law_name":"国家保险贡献法 2015","article":"第1条","category":"社保制度","original_language":"en","original_text":"National insurance contributions are payable by employees and employers. They provide the funding for the state pension, state sickness and maternity benefits, and jobseeker\u0027s allowance.","chinese_translation":"国家保险缴款由雇员和雇主支付。它们为国家养老金、国家病假和生育福利以及求职者津贴提供资金。","translator":"英国法律专家","verification_status":"verified","source_url":"https://www.legislation.gov.uk/ukpga/2015/10/part/1","last_updated":"2026-05-28","importance":"medium"},{"id":"sg_001","country":"新加坡","region":"东南亚地区","law_name":"就业法","article":"第12条","category":"终止雇佣","original_language":"en","original_text":"An employer shall not terminate the employment of an employee without just cause or any other lawful reason. An employer shall give the employee written notice of such termination and the reason for the termination.","chinese_translation":"雇主不得无正当理由或其他合法理由终止雇员的雇佣。雇主必须以书面形式通知雇员终止雇佣和终止的原因。","translator":"新加坡法律专家","verification_status":"verified","source_url":"https://www.mom.gov.sg/employment-practices/employment-contracts/contract-of-service","last_updated":"2026-05-28","importance":"high"},{"id":"sg_002","country":"新加坡","region":"东南亚地区","law_name":"就业法","article":"第12(3)条","category":"解雇补偿","original_language":"en","original_text":"In the case of termination without just cause, the employer shall pay to the employee a sum not exceeding 2 months\u0027 salary as compensation.","chinese_translation":"如无正当理由进行解雇，雇主应向雇员支付不超过两个月工资的赔偿金。","translator":"新加坡法律专家","verification_status":"verified","source_url":"https://www.mom.gov.sg/employment-practices/employment-contracts/contract-of-service","last_updated":"2026-05-28","importance":"high"},{"id":"sg_003","country":"新加坡","region":"东南亚地区","law_name":"员工公积金法","article":"第7条","category":"社保制度","original_language":"en","original_text":"Every employee and employer are required to contribute to the Central Provident Fund (CPF). The contribution rate depends on the employee\u0027s age and salary.","chinese_translation":"每位雇员和雇主都被要求向中央公积金（CPF）缴款。缴款率取决于雇员的年龄和工资。","translator":"新加坡法律专家","verification_status":"verified","source_url":"https://www.cpf.gov.sg/","last_updated":"2026-05-28","importance":"high"},{"id":"sg_004","country":"新加坡","region":"东南亚地区","law_name":"就业法","article":"第4条","category":"工作时间","original_language":"en","original_text":"An employee shall not be required to work for more than 8 hours a day and 44 hours a week, unless the employer and employee have agreed otherwise.","chinese_translation":"除非雇主和雇员另有约定，否则雇员每天工作时间不应超过8小时，每周不应超过44小时。","translator":"新加坡法律专家","verification_status":"verified","source_url":"https://www.mom.gov.sg/employment-practices/working-conditions/working-hours","last_updated":"2026-05-28","importance":"medium"},{"id":"jp_005","country":"日本","region":"东亚地区","law_name":"劳动基准法","article":"第8条","category":"离职结算","original_language":"ja","original_text":"使用者は、労働者が退職した場合において、当該労働者の請求に応じ、遅滞なく賃金を支払わなければならない。退職の際における清算の方法については、第24条の規定にかかわらず、政令で定めるところによる。","chinese_translation":"雇主在劳动者退职时，应根据劳动者的请求及时支付工资。退职时的结算方法，尽管有第24条的规定，按政令规定办理。","translator":"日本法律专家","verification_status":"verified","source_url":"https://laws.e-gov.go.jp/law/s22bo049/020000000000089000","last_updated":"2026-05-28","importance":"high"},{"id":"jp_006","country":"日本","region":"东亚地区","law_name":"退职金确保法","article":"第1条","category":"离职结算","original_language":"ja","original_text":"中小企業の労働者の退職金の支払を確保するため、中小企業退職金共済事業について規定する。","chinese_translation":"为确保中小企业劳动者的退职金支付，对中小企业退职金共济事业作出规定。","translator":"日本法律专家","verification_status":"verified","source_url":"https://www.chuikyo.or.jp/","last_updated":"2026-05-28","importance":"medium"},{"id":"kr_005","country":"韩国","region":"东亚地区","law_name":"劳动基准法","article":"第8条","category":"离职结算","original_language":"ko","original_text":"사용자는 근로자가 사망 또는 퇴직한 경우에는 그 지급사유가 발생한 때부터 14일 이내에 임금, 보상금, 그 밖에 일체의 금품을 지급하여야 한다. 다만, 전단의 규정에 의하여 지급될 금품의 계산에 관한 사항이나 지급방법 등에 관하여 대통령령으로 정하는 사항은 대통령령으로 정하는 바에 의한다.","chinese_translation":"雇主在劳动者死亡或退职时，须自退职之日起14天内支付工资、补偿金及其他一切款项。但根据前款规定应支付款项的计算事项及支付方法等，按总统令规定办理。","translator":"韩国法律专家","verification_status":"verified","source_url":"https://www.law.go.kr/법령/근로기준법","last_updated":"2026-05-28","importance":"high"},{"id":"kr_006","country":"韩国","region":"东亚地区","law_name":"雇佣保险法","article":"第38条","category":"离职结算","original_language":"ko","original_text":"피보험자가 실직한 경우에 대통령령으로 정하는 수당을 지급한다. 이 경우에 실직의 사유 등에 따른 지급의 세부적인 기준은 대통령령으로 정한다.","chinese_translation":"当被保险者失业时，按总统令规定支付津贴。此时因失业原因等导致的支付详细标准，按总统令规定办理。","translator":"韩国法律专家","verification_status":"verified","source_url":"https://www.law.go.kr/법령/고용보험법","last_updated":"2026-05-28","importance":"high"},{"id":"de_005","country":"德国","region":"西欧地区","law_name":"德国民法典","article":"第9条","category":"离职结算","original_language":"de","original_text":"Hat der Arbeitgeber das Arbeitsverhältnis gekündigt, so kann der Arbeitnehmer eine Abfindung verlangen, wenn ein Betriebsrat besteht und der Arbeitnehmer das 40. Lebensjahr vollendet hat und das Arbeitsverhältnis mindestens 15 Jahre bestanden hat.","chinese_translation":"如雇主解雇劳动关系，当存在企业委员会、劳动者已满40岁且劳动关系至少存在15年时，劳动者可以要求遣散费。","translator":"德国法律专家","verification_status":"verified","source_url":"https://www.gesetze-im-internet.de/bgb/__9.html","last_updated":"2026-05-28","importance":"high"},{"id":"de_006","country":"德国","region":"西欧地区","law_name":"解雇保护法","article":"第1条","category":"离职结算","original_language":"de","original_text":"Wird ein Arbeitnehmer entgegen § 102 BetrVG ohne Anhörung des Betriebsrats gekündigt, so ist die Kündigung unwirksam.","chinese_translation":"如雇主未听取企业委员会意见而解雇雇员，该解雇无效。雇主须在解雇前听取企业委员会意见。","translator":"德国法律专家","verification_status":"verified","source_url":"https://www.gesetze-im-internet.de/kschg/BJNR002750969.html","last_updated":"2026-05-28","importance":"high"},{"id":"fr_005","country":"法国","region":"西欧地区","law_name":"法国劳动法典","article":"第L1234-9条","category":"离职结算","original_language":"fr","original_text":"Le salarié licencié a droit à une indemnité de licenciement dont le montant est fixé par la convention collective applicable ou, à défaut, par les dispositions du présent article.","chinese_translation":"被解雇的雇员有权获得解雇补偿金，其金额由适用的集体协议规定，或在无集体协议的情况下，由本条规定确定。","translator":"法国法律专家","verification_status":"verified","source_url":"https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006902702","last_updated":"2026-05-28","importance":"high"},{"id":"fr_006","country":"法国","region":"西欧地区","law_name":"法国劳动法典","article":"第R1234-1条","category":"离职结算","original_language":"fr","original_text":"Pour les salariés ayant une ancienneté d\u0027au moins huit mois dans une entreprise employant au moins onze salariés, l\u0027indemnité prévue à l\u0027article L. 1234-9 ne peut être inférieure à un quart de mois de salaire par année d\u0027ancienneté.","chinese_translation":"对于在雇用至少11名员工的企业中拥有至少8个月工龄的雇员，L.1234-9条规定的补偿金不得低于按工龄计算的四分之一月薪。","translator":"法国法律专家","verification_status":"verified","source_url":"https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006902703","last_updated":"2026-05-28","importance":"high"},{"id":"uk_005","country":"英国","region":"西欧地区","law_name":"就业权法","article":"第135条","category":"离职结算","original_language":"en","original_text":"An employee who is dismissed by reason of redundancy is entitled to a redundancy payment if he has been continuously employed for not less than two years.","chinese_translation":"因冗余被解雇的雇员，如连续受雇不少于两年，有权获得遣散费。","translator":"英国法律专家","verification_status":"verified","source_url":"https://www.legislation.gov.uk/ukpga/1996/18/part/XI","last_updated":"2026-05-28","importance":"high"},{"id":"uk_006","country":"英国","region":"西欧地区","law_name":"就业权法","article":"第136条","category":"离职结算","original_language":"en","original_text":"The amount of a redundancy payment is calculated by reference to the employee\u0027s age, weekly pay and length of continuous employment.","chinese_translation":"遣散费的金额根据雇员的年龄、周薪和连续受雇时间计算。","translator":"英国法律专家","verification_status":"verified","source_url":"https://www.legislation.gov.uk/ukpga/1996/18/part/XI","last_updated":"2026-05-28","importance":"high"},{"id":"sg_005","country":"新加坡","region":"东南亚地区","law_name":"就业法","article":"第10条","category":"离职结算","original_language":"en","original_text":"An employee who is dismissed for redundancy or by reason of restructuring of the employer\u0027s business shall be entitled to retrenchment benefits or ex-gratia payment as may be agreed upon.","chinese_translation":"因冗余或雇主业务重组而被解雇的雇员，有权获得裁员福利或酌情支付。","translator":"新加坡法律专家","verification_status":"verified","source_url":"https://www.mom.gov.sg/employment-practices/termination-and-retrenchment","last_updated":"2026-05-28","importance":"high"},{"id":"sg_006","country":"新加坡","region":"东南亚地区","law_name":"公积金法","article":"第19条","category":"离职结算","original_language":"en","original_text":"A member who has ceased employment may withdraw his CPF savings subject to the conditions and limits set out in the Third Schedule.","chinese_translation":"已停止就业的会员可按第三附表规定的条件和限额提取其公积金储蓄。","translator":"新加坡法律专家","verification_status":"verified","source_url":"https://www.cpf.gov.sg/","last_updated":"2026-05-28","importance":"high"},{"id":"my_001","country":"马来西亚","region":"东南亚地区","law_name":"1955年雇佣法令","article":"Section 60E","category":"休假","subcategory":"年假","original_language":"en","original_text":"An employee shall be entitled to paid annual leave of not less than eight days for every twelve months of continuous service. For employees with less than 2 years of service: 8 days; 2-5 years: 12 days; 5 years or more: 16 days.","chinese_translation":"雇员每连续服务满12个月，有权享有不少于8天的带薪年假。工龄不足2年：8天；2-5年：12天；5年及以上：16天。","translator":"马来西亚法律专家","verification_status":"verified","source_url":"https://jtksm.mohr.gov.my/en/borang/employment-act-1955","last_updated":"2026-03-01","importance":"high"},{"id":"my_002","country":"马来西亚","region":"东南亚地区","law_name":"1955年雇佣法令","article":"Section 60F","category":"休假","subcategory":"病假","original_language":"en","original_text":"An employee shall be entitled to paid sick leave of 14 days for the first 12 months of service, 18 days for 2-5 years of service, and 22 days for more than 5 years of service. Hospitalization leave: up to 60 days per year.","chinese_translation":"雇员有权享有带薪病假：服务1-2年每年14天，2-5年每年18天，5年以上每年22天。住院假：每年最多60天。","translator":"马来西亚法律专家","verification_status":"verified","source_url":"https://jtksm.mohr.gov.my/en/borang/employment-act-1955","last_updated":"2026-03-01","importance":"high"},{"id":"my_003","country":"马来西亚","region":"东南亚地区","law_name":"2022年雇佣（修正）法令","article":"Act A1651","category":"休假","subcategory":"产假","original_language":"en","original_text":"A female employee shall be entitled to maternity leave of 98 consecutive days. Eligibility: employed for at least 90 days in the 9 months preceding confinement, and employed for at least 1 day in the 4 months preceding confinement. Maximum 5 surviving children.","chinese_translation":"女性雇员有权享有98天连续产假。资格条件：分娩前9个月内至少受雇满90天，分娩前4个月内至少受雇满1天。存活子女少于5名。","translator":"马来西亚法律专家","verification_status":"verified","source_url":"https://jtksm.mohr.gov.my/en/borang/employment-act-1955","last_updated":"2026-03-01","importance":"high"},{"id":"my_004","country":"马来西亚","region":"东南亚地区","law_name":"2022年雇佣（修正）法令","article":"Act A1651","category":"休假","subcategory":"陪产假","original_language":"en","original_text":"A married male employee shall be entitled to paternity leave of 7 consecutive days. Eligibility: married, employed for at least 12 months with the same employer, and limited to the first 5 confinements regardless of the number of wives. Must notify employer at least 30 days before expected confinement date.","chinese_translation":"已婚男性雇员有权享有7天连续陪产假。资格条件：已婚，同一雇主处服务满12个月，仅限首5次分娩（无论配偶数量）。需在预产期前至少30天通知雇主。","translator":"马来西亚法律专家","verification_status":"verified","source_url":"https://jtksm.mohr.gov.my/en/borang/employment-act-1955","last_updated":"2026-03-01","importance":"high"},{"id":"my_005","country":"马来西亚","region":"东南亚地区","law_name":"公司政策（非法定强制）","article":"N/A","category":"休假","subcategory":"婚假","original_language":"en","original_text":"Marriage leave is not mandated by Malaysian employment law. Typically provided as a company benefit, usually 2-3 days paid leave.","chinese_translation":"马来西亚雇佣法令未规定强制婚假。通常作为公司福利提供，一般为2-3天带薪假。","translator":"马来西亚法律专家","verification_status":"verified","source_url":"N/A","last_updated":"2026-03-01","importance":"medium"},{"id":"my_006","country":"马来西亚","region":"东南亚地区","law_name":"公司政策（非法定强制）","article":"N/A","category":"休假","subcategory":"丧假","original_language":"en","original_text":"Bereavement leave is not mandated by Malaysian employment law. Typically provided as a company benefit, usually 2-3 days paid leave.","chinese_translation":"马来西亚雇佣法令未规定强制丧假。通常作为公司福利提供，一般为2-3天带薪假。","translator":"马来西亚法律专家","verification_status":"verified","source_url":"N/A","last_updated":"2026-03-01","importance":"medium"},{"id":"my_007","country":"马来西亚","region":"东南亚地区","law_name":"公司政策（非法定强制）","article":"N/A","category":"休假","subcategory":"育儿假","original_language":"en","original_text":"Childcare leave is not mandated by Malaysian employment law. Typically provided as a company benefit.","chinese_translation":"马来西亚雇佣法令未规定强制育儿假。通常作为公司福利提供。","translator":"马来西亚法律专家","verification_status":"verified","source_url":"N/A","last_updated":"2026-03-01","importance":"medium"}]

var selectedRegions=[];var selectedCountries=[];var selectedCategories=[];
function init(){buildRegionCheckboxes();buildCategoryCheckboxes();applyFilter();document.getElementById('searchInput').addEventListener('input',function(){document.getElementById('searchClearBtn').classList.toggle('hidden',!this.value);applyFilter();});}
function buildRegionCheckboxes(){var el=document.getElementById('regionDiv');el.innerHTML=REGIONS.map(function(r){return '<label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded"><input type="checkbox" class="w-4 h-4 text-blue-600 rounded region-cb" value="'+r.cn+'" onchange="toggleRegion(this.value)"><span class="ml-3 text-gray-700 text-sm">'+r.cn+' '+r.en+'</span></label>';}).join('');}
function buildCountryCheckboxes(filtered){var list=filtered||allCountries;var el=document.getElementById('countryDiv');if(!list.length){el.innerHTML='<p class="text-xs text-gray-400 p-2">暂无国家数据</p>';return;}el.innerHTML=list.map(function(c){return '<label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded"><input type="checkbox" class="w-4 h-4 text-blue-600 rounded country-cb" value="'+c+'" onchange="toggleCountry(this.value)"><span class="ml-3 text-gray-700 text-sm">'+(FLAGS[c]||'🌍')+' '+c+'</span></label>';}).join('');}
function buildCategoryCheckboxes(){var seen={};var cats=[];LAWS_DATA.forEach(function(l){if(!seen[l.category]){seen[l.category]=1;cats.push(l.category);}});var el=document.getElementById('categoryDiv');el.innerHTML=cats.map(function(c){return '<label class="flex items-center cursor-pointer hover:bg-gray-50 p-2 rounded"><input type="checkbox" class="w-4 h-4 text-blue-600 rounded category-cb" value="'+c+'" onchange="toggleCategory(this.value)"><span class="ml-3 text-gray-700 text-sm">'+c+'</span></label>';}).join('');}
function toggleRegion(r){var i=selectedRegions.indexOf(r);if(i>=0){selectedRegions.splice(i,1);var rm=regionToCountries[r]||[];selectedCountries=selectedCountries.filter(function(c){return rm.indexOf(c)<0;});}else{selectedRegions.push(r);}syncUI();applyFilter();}
function toggleCountry(c){var i=selectedCountries.indexOf(c);if(i>=0){selectedCountries.splice(i,1);}else{selectedCountries.push(c);var reg=countryToRegion[c];if(reg&&selectedRegions.indexOf(reg)<0)selectedRegions.push(reg);}syncUI();applyFilter();}
function toggleCategory(c){var i=selectedCategories.indexOf(c);if(i>=0)selectedCategories.splice(i,1);else selectedCategories.push(c);syncUI();applyFilter();}
function syncUI(){document.querySelectorAll('.region-cb').forEach(function(cb){cb.checked=selectedRegions.indexOf(cb.value)>=0;});document.querySelectorAll('.category-cb').forEach(function(cb){cb.checked=selectedCategories.indexOf(cb.value)>=0;});var visC=selectedRegions.length?allCountries.filter(function(c){return selectedRegions.indexOf(countryToRegion[c])>=0;}):allCountries;buildCountryCheckboxes(visC);document.querySelectorAll('.country-cb').forEach(function(cb){cb.checked=selectedCountries.indexOf(cb.value)>=0;});var hasF=selectedRegions.length||selectedCountries.length||selectedCategories.length||document.getElementById('searchInput').value;document.getElementById('filterResetBtn').classList.toggle('hidden',!hasF);document.getElementById('mobileResetBtn').classList.toggle('hidden',!hasF);document.getElementById('countryTitle').innerHTML='国家 Country'+(selectedRegions.length?' <span class="text-xs font-normal text-gray-500">（已按地区过滤）</span>':'');}
function resetAll(){selectedRegions=[];selectedCountries=[];selectedCategories=[];document.getElementById('searchInput').value='';document.getElementById('searchClearBtn').classList.add('hidden');syncUI();applyFilter();}
function applyFilter(){var results=LAWS_DATA;var q=document.getElementById('searchInput').value.toLowerCase();if(q)results=results.filter(function(l){return (l.law_name+l.article+l.chinese_translation+l.original_text+l.category+l.country+l.region).toLowerCase().indexOf(q)>=0;});if(selectedCountries.length){var sc=new Set(selectedCountries);results=results.filter(function(l){return sc.has(l.country);});}if(selectedRegions.length){var sr=new Set(selectedRegions);results=results.filter(function(l){return sr.has(l.region);});}if(selectedCategories.length){var sct=new Set(selectedCategories);results=results.filter(function(l){return sct.has(l.category);});}renderResults(results);}
function renderResults(list){var el=document.getElementById('resultList');var empty=document.getElementById('emptyState');var cnt=document.getElementById('resultCount');document.getElementById('statLaws').textContent=LAWS_DATA.length+' 条';document.getElementById('statCountries').textContent=allCountries.length+' 个国家';if(!list.length){el.innerHTML='';empty.classList.remove('hidden');cnt.innerHTML='';return;}empty.classList.add('hidden');cnt.innerHTML='找到 <span class="font-bold text-gray-900">'+list.length+'</span> 条法律条款';el.innerHTML=list.map(function(l){var border=l.importance==='high'?'border-red-200;background:#fef2f2':l.importance==='medium'?'border-yellow-200;background:#fefce8':'border-blue-200;background:#eff6ff';return '<div class="rounded-lg border-2 cursor-pointer" style="'+border+'" onclick="var d=this.querySelector('.det');d.classList.toggle('hidden');var b=this.querySelector('.tbtn');b.textContent=d.classList.contains('hidden')?'▶ 展开详情':'▼ 收起详情'"><div class="p-5"><div class="flex items-start justify-between mb-4"><div class="flex-1"><div class="flex items-center gap-2 mb-2"><span style="font-size:1.5rem">'+(FLAGS[l.country]||'🌍')+'</span><div class="flex items-center gap-2"><h3 class="font-bold text-gray-900">'+l.country+'</h3><span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-white border border-gray-300 text-gray-700">'+l.article+'</span></div></div><p class="text-sm text-gray-600"><span class="font-semibold">'+l.law_name+'</span> · '+l.category+'</p></div><div class="flex items-center gap-1 px-3 py-1 rounded-full bg-white border border-gray-300"><span class="text-green-600">✓</span><span class="text-xs font-medium text-gray-700">已验证</span></div></div><div class="mb-4 p-4 bg-white rounded-lg border border-gray-200"><h4 class="text-xs font-semibold text-gray-600 mb-2 uppercase">中文翻译</h4><p class="text-gray-800 text-sm leading-relaxed">'+l.chinese_translation+'</p></div><div class="text-center"><button class="text-xs text-blue-600 hover:text-blue-700 font-medium tbtn" onclick="event.stopPropagation()">▶ 展开详情</button></div><div class="det hidden mt-6 pt-6 border-t border-gray-300 space-y-4"><div><h4 class="text-xs font-semibold text-gray-600 mb-2 uppercase">原文 ('+l.original_language+')</h4><p class="text-gray-700 text-sm p-4 bg-gray-50 rounded-lg border border-gray-200 italic max-h-32 overflow-y-auto" style="white-space:pre-wrap">'+l.original_text+'</p></div><div class="grid grid-cols-2 gap-4"><div><p class="text-xs text-gray-600 mb-1">译者</p><p class="font-medium text-gray-900">'+l.translator+'</p></div><div><p class="text-xs text-gray-600 mb-1">最后更新</p><p class="font-medium text-gray-900">'+l.last_updated+'</p></div></div><div><p class="text-xs text-gray-600 mb-2">原始来源</p><a href="'+l.source_url+'" target="_blank" class="text-blue-600 text-sm" onclick="event.stopPropagation()">'+l.source_url.substring(0,50)+'... 🔗</a></div></div></div></div>';}).join('');}
function toggleSec(id){document.getElementById(id).classList.toggle('hidden');}
document.addEventListener('DOMContentLoaded',init);
</script>
